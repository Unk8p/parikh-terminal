name: Nightly Enrichment

on:
  schedule:
    # 08:00 UTC = 01:00 MT / 03:00 CT / 04:00 ET — off-peak
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      # Persist enricher caches across runs so we're not re-fetching
      # Census/Overpass/DDG for every city every night.
      - name: Restore enricher cache
        id: cache
        uses: actions/cache@v4
        with:
          path: scripts/.cache
          key: enricher-cache-${{ github.run_id }}
          restore-keys: |
            enricher-cache-

      - name: Run enrichment pipeline
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python scripts/enrich.py -v

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet --exit-code -- data/ src/data.jsx; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- data/ src/data.jsx
          fi

      - name: Open PR with refreshed data
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: nightly/enrichment-${{ github.run_number }}
          base: main
          title: "Nightly enrichment — ${{ github.run_number }}"
          commit-message: "Nightly enrichment refresh"
          body: |
            Automated nightly enrichment run.

            This PR was opened by `.github/workflows/nightly.yml`. Review the
            changes to `data/listings.json` and `src/data.jsx`, then merge to
            trigger a DigitalOcean redeploy.

            Files touched:
            - `data/listings.json`  (canonical)
            - `src/data.jsx`        (regenerated wrapper)

            If a field flipped from `verified` → `inferred` without an obvious
            cause, that usually means a broker site changed its contact page
            layout — worth a quick look before merging.
          add-paths: |
            data/listings.json
            src/data.jsx
          delete-branch: true
