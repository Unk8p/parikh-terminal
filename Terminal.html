<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Parikh Acquisition Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0d;
    --bg-1: #121214;
    --bg-2: #1a1a1d;
    --bg-3: #232327;
    --line: #2a2a2e;
    --line-2: #363639;
    --ink: #ececed;
    --ink-2: #b0b0b3;
    --ink-3: #77777a;
    --ink-4: #4a4a4d;
    --amber: #e8b04a;
    --amber-2: #f0c46e;
    --amber-dim: #8a6a2a;
    --green: #6ec389;
    --red: #d16a6a;
    --blue: #6b9ad1;
    --purple: #a47bd1;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden; height: 100vh;
  }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  .serif { font-family: 'Instrument Serif', serif; font-style: italic; }

  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
  input, select, textarea { font: inherit; color: inherit; }
  a { color: var(--amber); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

  #root { height: 100vh; width: 100vw; }

  /* --- Mobile --- */
  @media (max-width: 768px) {
    html, body {
      overflow: auto;
      height: auto;
      min-height: 100vh;
      font-size: 14px;
    }
    #root { height: auto; width: 100%; min-height: 100vh; }
    ::-webkit-scrollbar { width: 0; height: 0; }
  }

  /* Mobile top bar — only visible on small screens */
  .mobile-topbar { display: none; }
  @media (max-width: 768px) {
    .mobile-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .mobile-topbar__brand {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--ink);
      flex: 1;
      line-height: 1;
    }
    .mobile-topbar__tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--ink-4);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .mobile-topbar__btn {
      padding: 7px 11px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--ink-2);
      background: var(--bg-2);
      border: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .mobile-topbar__btn--active {
      color: var(--amber-2);
      border-color: var(--amber-dim);
    }
  }

  /* Backdrop for mobile overlays */
  .mobile-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
  }
  @media (max-width: 768px) {
    .mobile-backdrop.open { display: block; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/scoring.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/sidebar.jsx"></script>
<script type="text/babel" src="src/table.jsx"></script>
<script type="text/babel" src="src/detail.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script type="text/babel">
  const { useEffect, useState } = React;
  function Boot() {
    const [ready, setReady] = useState(false);
    useEffect(() => {
      // wait for window.PARIKH_DATA to load
      let tries = 0;
      const t = setInterval(() => {
        tries++;
        if (window.PARIKH_DATA) { clearInterval(t); setReady(true); }
        else if (tries > 100) { clearInterval(t); console.error('Data load timeout'); }
      }, 50);
      return () => clearInterval(t);
    }, []);
    if (!ready) return <div style={{padding:40, color:'#77777a', fontFamily:'IBM Plex Mono'}}>loading…</div>;
    return <window.App />;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Boot />);
</script>
</body>
</html>
